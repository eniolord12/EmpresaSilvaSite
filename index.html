<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empresa Silva - Manutenção e Vendas</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="container header-content">
            <div class="logo">
                <img src="img/LogoEmpresaSilva/Logo-empresa-silva-vetorial.svg" alt="Logo Empresa Silva">
            </div>
            <nav>
                <ul>
                    <li><a href="#">Início</a></li>
                    <li><a href="#">Dicas</a></li>
                    <li><a href="#">Produtos</a></li>
                    <li><a href="#">Contatos</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="destaques">
        <div class="container">
            <h1 class="title-section">DESTAQUES</h1>
            <div class="carousel-container">
                <img src="img/ImgDeDestaques/fachada.jpg" alt="Fachada Empresa Silva">
            </div>
            <div class="dots">
                <span class="dot active"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>
    </section>

    <section class="autorizadas">
        <div class="container autorizadas-content">
            <div class="info-texto">
                <p>A Empresa Silva é uma empresa completa em assistência, autorizada por 26 marcas[cite: 1].</p>
            </div>
            <div class="marcas-logos">
                <img src="img/MarcasAutorizadas/SVG/DEWALT.svg" alt="DEWALT">
                <img src="img/MarcasAutorizadas/SVG/STANLEY.svg" alt="STANLEY">
                <img src="img/MarcasAutorizadas/SVG/BLACK+DECKER.svg" alt="BLACK+DECKER">
                <img src="img/MarcasAutorizadas/SVG/INGCO.svg" alt="INGCO">
                <img src="img/MarcasAutorizadas/SVG/VONDER.svg" alt="VONDER">
            </div>
        </div>
    </section>

    <section class="produtos">
        <div class="container">
            <h2 class="title-section">PRODUTOS</h2>
            <div class="filtros-produtos">
                <span>Ferramentas</span>
                <span>Utilitários</span>
                <span>Peças</span>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p><strong>Empresa Silva Manutenção</strong></p>
            <p>R. França, 2041 - Nações, Patrocínio-MG [cite: 1]</p>
        </div>
    </footer>

</body>

</html>
