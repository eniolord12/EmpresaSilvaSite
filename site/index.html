<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empresa Silva - Manutenção e Vendas</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="logo">
            <img src="img/LogoEmpresaSilva/LogoHorizontal-ParaFundoEscuro.svg" alt="Logo Empresa Silva">
        </div>
        <nav>
            <ul>
                <li><a href="#">Início</a></li>
                <li><a href="#">Dicas</a></li>
                <li><a href="#">Produtos</a></li>
                <li><a href="#">Contatos</a></li>
            </ul>
        </nav>
    </header>

    <section class="destaques">
        <h1 class="title-section">DESTAQUES</h1>
        <div class="carousel-container">
            <img src="img/MarcasAutorizadas/PNG/DEWALT.png" alt="Destaque Ferramentas">
        </div>
        <div class="dots">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
    </section>

    <section class="autorizadas">
        <div class="info-texto">
            <p>A Empresa Silva é uma empresa completa em assistência, autorizada por 26 marcas</p>
        </div>
        <div class="marcas-logos">
            <img src="img/MarcasAutorizadas/PNG/DEWALT.png" alt="DEWALT">
            <img src="img/MarcasAutorizadas/PNG/STANLEY.png" alt="STANLEY">
            <img src="img/MarcasAutorizadas/PNG/BLACK DECKER.png" alt="BLACK+DECKER">
            <img src="img/MarcasAutorizadas/PNG/INGCO.png" alt="INGCO">
            <img src="img/MarcasAutorizadas/PNG/VONDER.png" alt="VONDER">
            <img src="img/MarcasAutorizadas/PNG/WESCO.png" alt="WESCO">
            <img src="img/MarcasAutorizadas/PNG/WORX.png" alt="WORX">
        </div>
    </section>

    <section class="produtos">
        <h2 class="title-section">PRODUTOS</h2>
        <div class="filtros-produtos">
            <span>Ferramentas</span>
            <span>Utilitários</span>
            <span>Peças</span>
        </div>
    </section>

    <a href="https://wa.me/SEU_NUMERO" class="whatsapp-btn" target="_blank">
        <img src="img/whatsapp-icon.png" alt="WhatsApp">
    </a>

    <footer>
        <div class="footer-content">
            <p><strong>Empresa Silva Manutenção</strong></p>
            <p>R. França, 2041 - Nações, Patrocínio-MG</p>
            <p>Assistência Autorizada em 26 Marcas</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
